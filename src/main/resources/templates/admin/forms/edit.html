<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Edit Form')}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<th:block th:replace="~{layout/base :: nav}"></th:block>

<main class="flex-1 max-w-2xl mx-auto px-4 sm:px-6 py-10 w-full">
    <div class="mb-8">
        <a th:href="@{/admin/forms}" class="text-sm text-indigo-600 hover:underline">&larr; Back to Forms</a>
        <h1 class="mt-3 text-2xl font-bold text-gray-900">Edit Form</h1>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
        <div th:if="${error}"
             class="mb-5 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-700 text-sm"
             th:text="${error}"></div>

        <form th:action="@{/admin/forms/{id}/edit(id=${form.id})}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input id="title" name="title" type="text" th:value="${form.title}"
                       class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea id="description" name="description" rows="3"
                          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          th:text="${form.description}"></textarea>
            </div>

            <div>
                <label for="slug" class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
                <input id="slug" name="slug" type="text" th:value="${form.slug}"
                       class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                <p class="mt-1 text-xs text-gray-400">Changing the slug will break existing links to this form.</p>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors">
                    Save Changes
                </button>
                <a th:href="@{/admin/forms}"
                   class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</main>

<th:block th:replace="~{layout/base :: footer}"></th:block>
</body>
</html>
