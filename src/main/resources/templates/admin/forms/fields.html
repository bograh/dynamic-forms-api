<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Field Editor')}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<th:block th:replace="~{layout/base :: nav}"></th:block>

<main class="flex-1 max-w-4xl mx-auto px-4 sm:px-6 py-10 w-full">
    <div class="flex justify-between items-start mb-8">
        <div>
            <a th:href="@{/admin/forms}" class="text-sm text-indigo-600 hover:underline">&larr; Back</a>
            <h1 class="mt-3 text-2xl font-bold text-gray-900"
                th:text="'Fields — ' + ${form.title}">Fields</h1>
        </div>
        <div class="flex gap-3">
            <button id="add-field-btn"
                    class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
                + Add Field
            </button>
            <button id="save-btn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-lg text-sm transition-colors">
                Save Fields
            </button>
        </div>
    </div>

    <div id="toast" class="hidden fixed top-4 right-4 px-5 py-3 rounded-lg shadow-lg text-sm font-medium z-50"></div>

    <script type="application/json" id="field-types-json">
        ["TEXT","TEXTAREA","NUMBER","EMAIL","PHONE","DATE","SELECT","RADIO","CHECKBOX"]
    </script>

    <script type="application/json" id="initial-fields-json"
            th:inline="javascript">
        /*[[${form.fields}]]*/
    </script>

    <div id="fields-container" class="space-y-4"></div>

    <template id="field-row-template">
        <div class="field-row bg-white rounded-xl border border-gray-200 shadow-sm p-5" draggable="true">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm font-semibold text-gray-500 select-none cursor-grab">⠿ Field</span>
                <button type="button" class="remove-field-btn text-red-400 hover:text-red-600 text-sm">Remove</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Label *</label>
                    <input type="text" name="label" required
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Field Key *</label>
                    <input type="text" name="fieldKey" required
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Type *</label>
                    <select name="fieldType"
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Placeholder</label>
                    <input type="text" name="placeholder"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Help Text</label>
                    <input type="text" name="helpText"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="required" id="required-check-PLACEHOLDER"
                           class="text-indigo-600"/>
                    <label class="text-xs font-medium text-gray-600">Required</label>
                </div>
            </div>
            <div class="options-section mt-4 hidden">
                <label class="block text-xs font-medium text-gray-600 mb-2">Options</label>
                <div class="options-list space-y-2"></div>
                <button type="button"
                        class="add-option-btn mt-2 text-xs text-indigo-600 hover:underline font-medium">
                    + Add Option
                </button>
            </div>
        </div>
    </template>

    <template id="option-row-template">
        <div class="option-row flex gap-2 items-center">
            <input type="text" name="optLabel" placeholder="Label"
                   class="flex-1 rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500"/>
            <input type="text" name="optValue" placeholder="Value"
                   class="flex-1 rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500"/>
            <button type="button"
                    class="remove-option-btn text-red-400 hover:text-red-600 text-xs font-medium">✕</button>
        </div>
    </template>
</main>

<th:block th:replace="~{layout/base :: footer}"></th:block>

<script th:src="@{/js/field-editor.js}"></script>
<script th:inline="javascript">
    const FORM_ID = /*[[${form.id}]]*/ '';
</script>
</body>
</html>
