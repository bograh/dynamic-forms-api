<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--/* Head fragment — usage: <head th:replace="~{layout/base :: head('Page Title')}"></head> */-->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | DynamicForms'">DynamicForms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta id="_csrf" name="_csrf" th:content="${_csrf?.token}"/>
    <meta id="_csrf_header" name="_csrf_header" th:content="${_csrf?.headerName}"/>
</th:block>

<!--/* Nav fragment */-->
<nav th:fragment="nav" class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
        <a th:href="@{/forms}" class="text-xl font-bold text-indigo-600">DynamicForms</a>
        <div class="flex items-center gap-6 text-sm">
            <a sec:authorize="hasAuthority('ADMIN')"
               th:href="@{/admin/forms}"
               class="text-gray-600 hover:text-indigo-600 font-medium">Admin</a>
            <span sec:authentication="name" class="text-gray-500"></span>
            <form th:action="@{/logout}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="text-red-500 hover:text-red-700 font-medium">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!--/* Footer fragment */-->
<footer th:fragment="footer" class="mt-16 py-6 border-t border-gray-200 text-center text-gray-400 text-sm">
    &copy; 2026 DynamicForms
</footer>

</html>
