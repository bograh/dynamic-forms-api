<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Forms')}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<th:block th:replace="~{layout/base :: nav}"></th:block>

<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 py-10 w-full">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Available Forms</h1>
        <p class="mt-1 text-gray-500 text-sm">Select a form below to fill it out.</p>
    </div>

    <div th:if="${param.submitted}"
         class="mb-6 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-green-700 text-sm">
        Your submission was received successfully.
    </div>

    <div th:if="${#lists.isEmpty(forms)}"
         class="text-center py-20 text-gray-400">
        No forms are currently available.
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <a th:each="form : ${forms}"
           th:href="@{/forms/{slug}(slug=${form.slug})}"
           class="block bg-white rounded-xl border border-gray-200 shadow-sm p-6 hover:border-indigo-400 hover:shadow-md transition-all">
            <h2 class="text-lg font-semibold text-gray-900 mb-2" th:text="${form.title}">Form Title</h2>
            <p class="text-sm text-gray-500 line-clamp-3" th:text="${form.description}">Description</p>
            <span class="mt-4 inline-block text-xs text-indigo-600 font-medium">Fill out &rarr;</span>
        </a>
    </div>
</main>

<th:block th:replace="~{layout/base :: footer}"></th:block>
</body>
</html>
