spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

security-jwt:
  access-token-secret: ${JWT_ACCESS_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-secret: ${JWT_REFRESH_SECRET}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

allowed:
  cors:
    url: ${ALLOWED_CORS_URL}

server:
  port: ${SERVER_PORT:8085}

logging:
  level:
    root: WARN
    dev.ograh: INFO
